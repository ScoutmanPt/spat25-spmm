<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 420">
  <defs>
    <!-- room background gradient -->
    <radialGradient id="roomBg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#0a1a3a"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>

    <!-- floor grid glow -->
    <linearGradient id="floorFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00d4ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <!-- center pillar/pedestal glow -->
    <radialGradient id="pedestalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00ccff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0044cc" stop-opacity="0"/>
    </radialGradient>

    <!-- logo glow halo -->
    <radialGradient id="logoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00eeff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0055ff" stop-opacity="0"/>
    </radialGradient>

    <!-- top ceiling glow -->
    <radialGradient id="ceilGlow" cx="50%" cy="0%" r="60%">
      <stop offset="0%"   stop-color="#0088ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0011aa" stop-opacity="0"/>
    </radialGradient>

    <!-- scan line overlay -->
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="rgba(0,200,255,0.04)"/>
    </pattern>

    <!-- particle glow -->
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === BACKGROUND === -->
  <rect width="900" height="420" fill="url(#roomBg)"/>
  <rect width="900" height="420" fill="url(#ceilGlow)"/>

  <!-- ── BACK WALL ── -->
  <!-- wall surface -->
  <polygon points="120,30 780,30 700,200 200,200" fill="#040e22" opacity="0.95"/>
  <!-- wall horizontal lines -->
  <line x1="135" y1="55"  x2="765" y2="55"  stroke="#00aaff" stroke-width="0.4" opacity="0.35"/>
  <line x1="150" y1="80"  x2="750" y2="80"  stroke="#00aaff" stroke-width="0.4" opacity="0.3"/>
  <line x1="165" y1="105" x2="735" y2="105" stroke="#00aaff" stroke-width="0.4" opacity="0.25"/>
  <line x1="180" y1="130" x2="720" y2="130" stroke="#00aaff" stroke-width="0.4" opacity="0.2"/>
  <line x1="195" y1="155" x2="705" y2="155" stroke="#00aaff" stroke-width="0.4" opacity="0.15"/>
  <!-- wall vertical lines (perspective) -->
  <line x1="450" y1="30" x2="450" y2="200" stroke="#00aaff" stroke-width="0.5" opacity="0.4"/>
  <line x1="330" y1="30" x2="290" y2="200" stroke="#00aaff" stroke-width="0.4" opacity="0.25"/>
  <line x1="570" y1="30" x2="610" y2="200" stroke="#00aaff" stroke-width="0.4" opacity="0.25"/>
  <line x1="210" y1="30" x2="130" y2="200" stroke="#00aaff" stroke-width="0.3" opacity="0.15"/>
  <line x1="690" y1="30" x2="770" y2="200" stroke="#00aaff" stroke-width="0.3" opacity="0.15"/>

  <!-- corner vertical columns -->
  <line x1="120" y1="30" x2="20"  y2="420" stroke="#00ccff" stroke-width="1" opacity="0.5"/>
  <line x1="780" y1="30" x2="880" y2="420" stroke="#00ccff" stroke-width="1" opacity="0.5"/>

  <!-- ── FLOOR GRID ── -->
  <!-- base floor -->
  <polygon points="20,420 880,420 700,200 200,200" fill="#030d1e"/>

  <!-- floor perspective lines (horizontal) -->
  <line x1="200" y1="200" x2="700" y2="200" stroke="#00d4ff" stroke-width="0.6" opacity="0.6"/>
  <line x1="170" y1="240" x2="730" y2="240" stroke="#00aaff" stroke-width="0.5" opacity="0.45"/>
  <line x1="135" y1="285" x2="765" y2="285" stroke="#0088ff" stroke-width="0.5" opacity="0.35"/>
  <line x1="90"  y1="335" x2="810" y2="335" stroke="#0066cc" stroke-width="0.4" opacity="0.25"/>
  <line x1="40"  y1="385" x2="860" y2="385" stroke="#004499" stroke-width="0.4" opacity="0.15"/>

  <!-- floor perspective lines (left vanish) -->
  <line x1="450" y1="200" x2="20"  y2="420" stroke="#00ccff" stroke-width="0.5" opacity="0.4"/>
  <line x1="330" y1="200" x2="20"  y2="420" stroke="#0099cc" stroke-width="0.4" opacity="0.3"/>
  <line x1="565" y1="200" x2="20"  y2="420" stroke="#0099cc" stroke-width="0.4" opacity="0.3"/>
  <line x1="245" y1="200" x2="20"  y2="420" stroke="#006699" stroke-width="0.3" opacity="0.2"/>
  <line x1="640" y1="200" x2="20"  y2="420" stroke="#006699" stroke-width="0.3" opacity="0.2"/>
  <line x1="700" y1="200" x2="20"  y2="420" stroke="#004477" stroke-width="0.3" opacity="0.15"/>

  <!-- floor perspective lines (right vanish) -->
  <line x1="450" y1="200" x2="880" y2="420" stroke="#00ccff" stroke-width="0.5" opacity="0.4"/>
  <line x1="565" y1="200" x2="880" y2="420" stroke="#0099cc" stroke-width="0.4" opacity="0.3"/>
  <line x1="335" y1="200" x2="880" y2="420" stroke="#0099cc" stroke-width="0.4" opacity="0.3"/>
  <line x1="640" y1="200" x2="880" y2="420" stroke="#006699" stroke-width="0.3" opacity="0.2"/>
  <line x1="245" y1="200" x2="880" y2="420" stroke="#006699" stroke-width="0.3" opacity="0.2"/>
  <line x1="200" y1="200" x2="880" y2="420" stroke="#004477" stroke-width="0.3" opacity="0.15"/>

  <!-- ── SIDE WALLS ── -->
  <polygon points="20,420 200,200 120,30 0,0 0,420" fill="#030c1d" opacity="0.9"/>
  <polygon points="880,420 700,200 780,30 900,0 900,420" fill="#030c1d" opacity="0.9"/>

  <!-- left wall lines -->
  <line x1="0"   y1="100" x2="200" y2="200" stroke="#0066aa" stroke-width="0.4" opacity="0.3"/>
  <line x1="0"   y1="200" x2="200" y2="200" stroke="#0066aa" stroke-width="0.4" opacity="0.25"/>
  <line x1="0"   y1="300" x2="200" y2="200" stroke="#0066aa" stroke-width="0.4" opacity="0.2"/>
  <!-- right wall lines -->
  <line x1="900" y1="100" x2="700" y2="200" stroke="#0066aa" stroke-width="0.4" opacity="0.3"/>
  <line x1="900" y1="200" x2="700" y2="200" stroke="#0066aa" stroke-width="0.4" opacity="0.25"/>
  <line x1="900" y1="300" x2="700" y2="200" stroke="#0066aa" stroke-width="0.4" opacity="0.2"/>

  <!-- ── CEILING ── -->
  <polygon points="0,0 900,0 780,30 120,30" fill="#020b1c"/>
  <line x1="0" y1="0" x2="120" y2="30" stroke="#00ccff" stroke-width="0.8" opacity="0.3"/>
  <line x1="900" y1="0" x2="780" y2="30" stroke="#00ccff" stroke-width="0.8" opacity="0.3"/>

  <!-- ── PEDESTAL / GLOW RING ── -->
  <ellipse cx="450" cy="310" rx="100" ry="18" fill="url(#pedestalGlow)" filter="url(#softBloom)"/>
  <ellipse cx="450" cy="310" rx="75"  ry="13" fill="none" stroke="#00d4ff" stroke-width="1.2" opacity="0.6" filter="url(#bloom)"/>
  <ellipse cx="450" cy="310" rx="50"  ry="8"  fill="none" stroke="#00eeff" stroke-width="0.8" opacity="0.8" filter="url(#bloom)"/>

  <!-- ── LOGO GLOW HALO ── -->
  <ellipse cx="450" cy="210" rx="120" ry="120" fill="url(#logoGlow)" filter="url(#softBloom)"/>

  <!-- ── FLOATING RING UNDER LOGO ── -->
  <ellipse cx="450" cy="270" rx="88" ry="14" fill="none" stroke="#00ccff" stroke-width="1.5" opacity="0.5" filter="url(#bloom)"/>
  <ellipse cx="450" cy="268" rx="88" ry="14" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.3"/>

  <!-- ── VERTICAL BEAM (light shaft under logo) ── -->
  <polygon points="430,270 470,270 480,420 420,420" fill="#00bbff" opacity="0.04"/>
  <polygon points="440,270 460,270 462,420 438,420" fill="#00eeff" opacity="0.06"/>

  <!-- ── SP.PNG LOGO (centered, elevated, floating) ── -->
  <image href="./sp.png" x="355" y="120" width="190" height="190" filter="url(#bloom)"/>

  <!-- ── SCANLINE OVERLAY ── -->
  <rect width="900" height="420" fill="url(#scanlines)" opacity="0.6"/>

  <!-- ── PARTICLES / STARS ── -->
  <circle cx="80"  cy="60"  r="1.2" fill="#00eeff" opacity="0.7" filter="url(#bloom)"/>
  <circle cx="200" cy="40"  r="0.8" fill="#88ddff" opacity="0.6"/>
  <circle cx="340" cy="25"  r="1.0" fill="#00ccff" opacity="0.5"/>
  <circle cx="580" cy="18"  r="1.2" fill="#00eeff" opacity="0.7" filter="url(#bloom)"/>
  <circle cx="720" cy="45"  r="0.8" fill="#88ddff" opacity="0.6"/>
  <circle cx="820" cy="70"  r="1.0" fill="#00ccff" opacity="0.5"/>
  <circle cx="140" cy="150" r="0.7" fill="#00aaff" opacity="0.4"/>
  <circle cx="760" cy="130" r="0.7" fill="#00aaff" opacity="0.4"/>
  <circle cx="60"  cy="300" r="0.8" fill="#0088cc" opacity="0.3"/>
  <circle cx="840" cy="280" r="0.8" fill="#0088cc" opacity="0.3"/>

  <!-- floating data particles rising -->
  <circle cx="380" cy="95"  r="1.5" fill="#00ffee" opacity="0.5" filter="url(#bloom)"/>
  <circle cx="415" cy="75"  r="1.0" fill="#00ddff" opacity="0.4"/>
  <circle cx="490" cy="88"  r="1.5" fill="#00ffee" opacity="0.5" filter="url(#bloom)"/>
  <circle cx="520" cy="65"  r="1.0" fill="#00ddff" opacity="0.4"/>
  <circle cx="460" cy="55"  r="2.0" fill="#00eeff" opacity="0.6" filter="url(#bloom)"/>

  <!-- ── TEXT LABELS ── -->
  <!-- title top -->
  <text x="450" y="22" text-anchor="middle"
        font-family="'Courier New', monospace" font-weight="700" font-size="13"
        fill="#00eeff" letter-spacing="6" filter="url(#textGlow)" opacity="0.9">
    SHAREPOINT MEMORABILIA
  </text>

  <!-- subtitle bottom -->
  <text x="450" y="400" text-anchor="middle"
        font-family="'Courier New', monospace" font-weight="400" font-size="10"
        fill="#0099cc" letter-spacing="4" opacity="0.7">
    25 YEARS OF HISTORY · WALK THROUGH TIME
  </text>

  <!-- year markers on floor -->
  <text x="230" y="360" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="9"
        fill="#005588" letter-spacing="2" opacity="0.6">1999</text>
  <text x="340" y="330" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="9"
        fill="#006699" letter-spacing="2" opacity="0.65">2003</text>
  <text x="450" y="310" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="9"
        fill="#0088bb" letter-spacing="2" opacity="0.7">2010</text>
  <text x="560" y="330" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="9"
        fill="#006699" letter-spacing="2" opacity="0.65">2016</text>
  <text x="670" y="360" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="9"
        fill="#005588" letter-spacing="2" opacity="0.6">2025</text>

  <!-- corner UI decoration -->
  <rect x="12" y="8"  width="30" height="1" fill="#00ccff" opacity="0.5"/>
  <rect x="12" y="8"  width="1"  height="30" fill="#00ccff" opacity="0.5"/>
  <rect x="858" y="8"  width="30" height="1" fill="#00ccff" opacity="0.5"/>
  <rect x="887" y="8"  width="1"  height="30" fill="#00ccff" opacity="0.5"/>
  <rect x="12" y="411" width="30" height="1" fill="#00ccff" opacity="0.3"/>
  <rect x="12" y="382" width="1"  height="30" fill="#00ccff" opacity="0.3"/>
  <rect x="858" y="411" width="30" height="1" fill="#00ccff" opacity="0.3"/>
  <rect x="887" y="382" width="1"  height="30" fill="#00ccff" opacity="0.3"/>
</svg>
